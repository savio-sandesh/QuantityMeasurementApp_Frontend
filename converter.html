<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-requires-auth="true">
    <!-- Protected dashboard shell for conversion operations and history tracking. -->
    <main class="page-shell">
      <section class="dashboard-card" aria-label="Quantity converter dashboard">
        <!-- Left navigation selects measurement category and handles logout. -->
        <aside class="category-nav" aria-label="Measurement categories">
          <h2>Categories</h2>
          <button class="category-btn is-active" type="button" data-category="Length">Length</button>
          <button class="category-btn" type="button" data-category="Volume">Volume</button>
          <button class="category-btn" type="button" data-category="Weight">Weight</button>
          <button class="category-btn" type="button" data-category="Temperature">Temperature</button>
          <button class="primary-btn logout-btn" id="logoutBtn" type="button">Logout</button>
        </aside>

        <!-- Main panel hosts operation controls, result cards, and history table. -->
        <section class="converter-panel" aria-label="Conversion form">
          <div class="converter-header">
            <h1>Quantity Measurement Dashboard</h1>
            <p id="activeCategoryLabel">Length Conversion</p>
          </div>

          <div class="operation-tabs" id="operationSelector" aria-label="Operations">
            <button class="operation-btn is-active" type="button" data-operation="convert">Convert</button>
            <button class="operation-btn" type="button" data-operation="compare">Compare</button>
            <button class="operation-btn" type="button" data-operation="add">Add</button>
            <button class="operation-btn" type="button" data-operation="subtract">Subtract</button>
            <button class="operation-btn" type="button" data-operation="divide">Divide</button>
          </div>

          <form id="converterForm" class="converter-form" novalidate>
            <div id="main-fields" class="field-group">
              <label id="inputValueLabel" for="inputValue">Value</label>
              <input id="inputValue" type="number" step="any" placeholder="Enter value" required />

              <div id="mainUnitGrid" class="unit-grid">
                <div>
                  <label id="fromUnitLabel" for="fromUnit">From Unit</label>
                  <select id="fromUnit"></select>
                </div>
                <div id="toUnitField">
                  <label id="toUnitLabel" for="toUnit">To Unit</label>
                  <select id="toUnit"></select>
                </div>
              </div>
            </div>

            <div id="arithmetic-fields" class="field-group" hidden>
              <label id="inputValue2Label" for="inputValue2">Second Value</label>
              <input id="inputValue2" type="number" step="any" placeholder="Enter value" />

              <div>
                <label id="fromUnit2Label" for="fromUnit2">Second Unit</label>
                <select id="fromUnit2"></select>
              </div>
            </div>

            <button id="convertBtn" class="primary-btn" type="submit">Convert</button>
          </form>

          <div class="dashboard-metrics">
            <section class="result-card" aria-live="polite">
              <h3>Result</h3>
              <p id="resultValue">Enter value and press Convert</p>
            </section>

            <section class="result-card count-card" aria-live="polite">
              <h3>Total Operations</h3>
              <p id="operationsCount">0</p>
            </section>
          </div>

          <section class="history-card" aria-label="Conversion history">
            <div class="history-header">
              <h3>History</h3>
              <button id="refreshHistoryBtn" class="secondary-btn" type="button">Refresh</button>
            </div>

            <div class="history-table-wrap">
              <table class="history-table" id="historyTable">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Type</th>
                    <th>Operation</th>
                    <th>Input</th>
                    <th>Result</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="historyBody">
                  <tr>
                    <td colspan="6">No conversions yet. Start by converting some units!</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </section>
        </section>
      </section>
    </main>

    <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

    <script src="script.js"></script>
  </body>
</html>
